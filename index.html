<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة دارك FM - صانع الأخبار العاجلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #111827;
            color: white;
            overflow-x: hidden;
        }

        #canvas-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #news-canvas {
            width: 400px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #4b5563, #1f2937);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform-origin: top center;
            border-radius: 8px;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 40%, transparent 100%);
            z-index: 1;
        }

        .urgent-tag {
            background: #e11d48;
            color: white;
            padding: 4px 16px;
            font-weight: 900;
            font-size: 1.1rem;
            display: inline-block;
            clip-path: polygon(0 0, 95% 0, 100% 100%, 5% 100%);
        }

        #bg-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .content-area {
            position: absolute;
            left: 20px;
            right: 20px;
            z-index: 2;
        }

        .content-image-mode {
            bottom: 30px;
            top: auto;
        }

        .content-text-mode {
            top: 50%;
            transform: translateY(-50%);
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 12px;
            border-right: 5px solid #dc2626;
        }

        #result-preview {
            display: none;
            max-width: 100%;
            margin-top: 20px;
            border: 2px solid #e11d48;
            border-radius: 8px;
        }

        .logo-area {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
            text-align: right;
        }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        
        <!-- Preview Section -->
        <div id="canvas-wrapper" class="order-1">
            <div id="news-canvas">
                <img id="bg-preview" src="" alt="خلفية" style="display: none;">
                <div id="gradient-overlay" class="gradient-overlay" style="display: none;"></div>

                <div class="logo-area">
                    <div class="bg-black/80 backdrop-blur-md px-3 py-1.5 rounded-lg border border-gray-600 inline-block">
                        <div class="flex flex-col text-right">
                            <h1 class="text-xl font-black text-white">إذاعة دارك</h1>
                            <p class="text-[10px] text-red-500 font-black">94.3 FM</p>
                        </div>
                    </div>
                </div>

                <div id="content-container" class="content-area content-text-mode">
                    <div class="urgent-tag mb-2">خبر عاجل</div>
                    <div id="display-title" class="text-red-500 font-bold text-sm mb-1">الآن مباشرة</div>
                    <div id="display-text" class="font-bold leading-snug text-white mb-4" style="font-size: 26px;">
                        أدخل تفاصيل الخبر هنا...
                    </div>
                    <div class="h-1 w-16 bg-red-600 rounded-full"></div>
                </div>
            </div>
            
            <!-- تعليمات الحفظ للهواتف -->
            <p id="save-hint" class="hidden mt-4 text-sm text-green-400 font-bold text-center">
                ✅ تم توليد الصورة بنجاح!<br>اضغط مطولاً على الصورة أدناه لحفظها.
            </p>
            <img id="result-preview" alt="الصورة المولدة ستظهر هنا">
        </div>

        <!-- Controls Section -->
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl space-y-6 order-2 border border-gray-700">
            <h2 class="text-2xl font-black text-red-500 border-b border-gray-700 pb-4">لوحة التحكم</h2>
            
            <div>
                <label class="block text-sm font-bold mb-2">صورة الخلفية</label>
                <input type="file" id="image-input" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-red-600 file:text-white file:border-0 cursor-pointer">
                <button id="remove-img" class="mt-2 text-xs text-gray-400 underline">إزالة الصورة</button>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">نص الخبر</label>
                <textarea id="text-input" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 focus:ring-2 focus:ring-red-600 outline-none text-white transition-all"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold mb-2">العنوان العلوي</label>
                    <input type="text" id="title-input" value="الآن مباشرة" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2 text-white">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">حجم الخط</label>
                    <input type="range" id="font-size-slider" min="18" max="40" value="26" class="w-full accent-red-600">
                </div>
            </div>

            <button id="generate-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                <span>إنشاء وحفظ الصورة</span>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('news-canvas');
        const textInput = document.getElementById('text-input');
        const titleInput = document.getElementById('title-input');
        const imageInput = document.getElementById('image-input');
        const displayText = document.getElementById('display-text');
        const displayTitle = document.getElementById('display-title');
        const bgPreview = document.getElementById('bg-preview');
        const gradientOverlay = document.getElementById('gradient-overlay');
        const contentContainer = document.getElementById('content-container');
        const generateBtn = document.getElementById('generate-btn');
        const resultPreview = document.getElementById('result-preview');
        const saveHint = document.getElementById('save-hint');

        // التوافق مع الجوال
        function resize() {
            const wrapper = document.getElementById('canvas-wrapper');
            const scale = Math.min(wrapper.clientWidth / 400, 1);
            canvas.style.transform = `scale(${scale})`;
            wrapper.style.height = `${500 * scale + (resultPreview.style.display === 'block' ? 500 : 0)}px`;
        }
        window.addEventListener('resize', resize);
        resize();

        // تحديث النصوص
        textInput.addEventListener('input', () => displayText.innerText = textInput.value || 'أدخل تفاصيل الخبر هنا...');
        titleInput.addEventListener('input', () => displayTitle.innerText = titleInput.value);
        document.getElementById('font-size-slider').addEventListener('input', (e) => {
            displayText.style.fontSize = e.target.value + 'px';
        });

        // معالجة الصور
        imageInput.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                bgPreview.src = event.target.result;
                bgPreview.style.display = 'block';
                gradientOverlay.style.display = 'block';
                contentContainer.className = 'content-area content-image-mode';
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('remove-img').onclick = () => {
            bgPreview.style.display = 'none';
            gradientOverlay.style.display = 'none';
            contentContainer.className = 'content-area content-text-mode';
            imageInput.value = '';
        };

        // دالة الحفظ الرئيسية المصلحة
        generateBtn.onclick = async () => {
            generateBtn.disabled = true;
            generateBtn.innerText = 'جاري المعالجة...';
            
            // إخفاء المعاينة القديمة
            resultPreview.style.display = 'none';
            saveHint.classList.add('hidden');

            try {
                // التقاط الصورة
                const dataUrl = await htmlToImage.toPng(canvas, {
                    pixelRatio: 2,
                    skipAutoScale: true
                });

                // الحل المزدوج: محاولة التنزيل وإظهار المعاينة
                const link = document.createElement('a');
                link.download = `DarkFM_${Date.now()}.png`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // إظهار الصورة للمستخدم في حال فشل التنزيل التلقائي
                resultPreview.src = dataUrl;
                resultPreview.style.display = 'block';
                saveHint.classList.remove('hidden');
                
                // التمرير لأسفل لرؤية النتيجة
                resultPreview.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error('Error:', error);
                alert('عذراً، حدث خطأ أثناء الحفظ. يرجى تجربة متصفح آخر أو التقاط سكرين شوت.');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = 'إنشاء وحفظ الصورة';
                resize();
            }
        };
    </script>
</body>
</html>
