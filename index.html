<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة دارك FM - صانع الأخبار العاجلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        #canvas-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* حاوية التصميم الأساسية */
        #news-canvas {
            width: 400px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #374151, #111827);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform-origin: top center;
            border-radius: 4px;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            z-index: 1;
        }

        /* تصميم كلمة عاجل بشكل ثابت لضمان عدم الاختفاء */
        .urgent-badge {
            background-color: #e11d48;
            color: white;
            padding: 6px 20px;
            font-weight: 900;
            font-size: 1.2rem;
            display: inline-block;
            position: relative;
            z-index: 10;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            border-radius: 2px;
        }

        #bg-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .content-area {
            position: absolute;
            left: 25px;
            right: 25px;
            z-index: 5;
            transition: all 0.3s ease;
        }

        /* وضع الصورة: النص بالأسفل */
        .content-image-mode {
            bottom: 40px;
            top: auto;
        }

        /* وضع النص فقط: النص بالمنتصف مع خلفية زجاجية */
        .content-text-mode {
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 12px;
            border-right: 6px solid #e11d48;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        #result-preview {
            display: none;
            max-width: 100%;
            margin-top: 25px;
            border: 3px solid #e11d48;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(225, 29, 72, 0.3);
        }

        .logo-area {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            text-align: right;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        
        <!-- Preview Section -->
        <div id="canvas-wrapper" class="order-1">
            <div id="news-canvas">
                <!-- صورة الخلفية -->
                <img id="bg-preview" src="" alt="خلفية" style="display: none;">
                <div id="gradient-overlay" class="gradient-overlay" style="display: none;"></div>

                <!-- الشعار -->
                <div class="logo-area">
                    <div class="bg-black/90 backdrop-blur-md px-4 py-2 rounded-lg border border-gray-700 inline-block">
                        <div class="flex flex-col text-right">
                            <h1 class="text-xl font-black text-white leading-none">إذاعة دارك</h1>
                            <p class="text-[11px] text-red-500 font-black mt-1 uppercase tracking-widest">94.3 FM</p>
                        </div>
                    </div>
                </div>

                <!-- منطقة محتوى الخبر -->
                <div id="content-container" class="content-area content-text-mode">
                    <div class="flex justify-start mb-4">
                        <div class="urgent-badge">خبر عاجل</div>
                    </div>
                    
                    <div id="display-title" class="text-red-500 font-black text-sm mb-2">الآن مباشرة</div>
                    
                    <div id="display-text" class="font-bold leading-tight text-white mb-6" style="font-size: 26px;">
                        اكتب تفاصيل الخبر هنا ليظهر بشكل صحيح واحترافي...
                    </div>
                    
                    <div class="flex justify-between items-end border-t border-red-600/30 pt-4">
                        <div class="h-1 w-12 bg-red-600 rounded-full"></div>
                        <div id="display-date" class="text-gray-300 text-xs font-bold"></div>
                    </div>
                </div>
            </div>
            
            <div id="save-instructions" class="hidden mt-6 bg-green-900/30 p-4 rounded-xl border border-green-500/50 text-center">
                <p class="text-green-400 font-black text-sm">✅ تم إنشاء الصورة بجودة عالية!</p>
                <p class="text-white text-xs mt-1">إذا لم يبدأ التحميل، اضغط مطولاً على الصورة أدناه للحفظ.</p>
            </div>
            
            <img id="result-preview" alt="الصورة المولدة">
        </div>

        <!-- Controls Section -->
        <div class="bg-gray-900 p-6 sm:p-8 rounded-3xl shadow-2xl space-y-6 order-2 border border-gray-800">
            <h2 class="text-2xl font-black text-red-500 border-b border-gray-800 pb-4 flex items-center gap-2">
                تعديل الخبر العاجل
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">صورة الخلفية</label>
                    <div class="flex gap-2">
                        <input type="file" id="image-input" accept="image/*" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-gray-800 file:text-white hover:file:bg-gray-700 cursor-pointer">
                        <button id="clear-img" class="text-xs bg-red-900/20 text-red-500 px-3 rounded-full border border-red-500/20">حذف</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">نص الخبر</label>
                    <textarea id="text-input" rows="4" class="w-full bg-black border border-gray-800 rounded-2xl p-4 focus:ring-2 focus:ring-red-600 outline-none text-white font-bold transition-all" placeholder="ادخل تفاصيل الخبر هنا..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">الكلمة الدلالية</label>
                        <input type="text" id="title-input" value="الآن مباشرة" class="w-full bg-black border border-gray-800 rounded-xl p-3 text-white font-bold outline-none focus:ring-1 focus:ring-red-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">حجم الخط</label>
                        <input type="range" id="font-size-slider" min="18" max="42" value="26" class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-red-600 mt-4">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">التاريخ</label>
                    <input type="text" id="date-input" class="w-full bg-black border border-gray-800 rounded-xl p-3 text-white font-bold outline-none">
                </div>
            </div>

            <button id="download-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                توليد وحفظ الصورة
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('news-canvas');
        const textInput = document.getElementById('text-input');
        const titleInput = document.getElementById('title-input');
        const dateInput = document.getElementById('date-input');
        const imageInput = document.getElementById('image-input');
        const displayText = document.getElementById('display-text');
        const displayTitle = document.getElementById('display-title');
        const displayDate = document.getElementById('display-date');
        const bgPreview = document.getElementById('bg-preview');
        const gradientOverlay = document.getElementById('gradient-overlay');
        const contentContainer = document.getElementById('content-container');
        const downloadBtn = document.getElementById('download-btn');
        const resultPreview = document.getElementById('result-preview');
        const saveInstructions = document.getElementById('save-instructions');

        // تعيين التاريخ الحالي تلقائياً
        const now = new Date();
        const defaultDate = now.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
        dateInput.value = defaultDate;
        displayDate.innerText = defaultDate;

        // تحديث التاريخ عند التغيير
        dateInput.addEventListener('input', (e) => displayDate.innerText = e.target.value);

        // التوافق مع الجوال (Scaling)
        function updateScale() {
            const wrapper = document.getElementById('canvas-wrapper');
            const scale = Math.min(wrapper.clientWidth / 400, 1);
            canvas.style.transform = `scale(${scale})`;
            wrapper.style.height = `${500 * scale}px`;
            if (resultPreview.style.display === 'block') {
                wrapper.style.height = 'auto';
            }
        }
        window.addEventListener('resize', updateScale);
        updateScale();

        // تحديث النصوص
        textInput.addEventListener('input', () => displayText.innerText = textInput.value || 'اكتب تفاصيل الخبر هنا...');
        titleInput.addEventListener('input', () => displayTitle.innerText = titleInput.value);
        document.getElementById('font-size-slider').addEventListener('input', (e) => {
            displayText.style.fontSize = e.target.value + 'px';
        });

        // التعامل مع الصور
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    bgPreview.src = event.target.result;
                    bgPreview.style.display = 'block';
                    gradientOverlay.style.display = 'block';
                    contentContainer.className = 'content-area content-image-mode';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('clear-img').onclick = () => {
            bgPreview.style.display = 'none';
            gradientOverlay.style.display = 'none';
            contentContainer.className = 'content-area content-text-mode';
            imageInput.value = '';
        };

        // دالة الحفظ المحسنة
        downloadBtn.onclick = async () => {
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = 'جاري المعالجة...';
            
            // إخفاء المعاينة القديمة
            resultPreview.style.display = 'none';
            saveInstructions.classList.add('hidden');

            // تأخير بسيط لضمان تحميل كافة العناصر والخطوط في المتصفح
            await new Promise(resolve => setTimeout(resolve, 500));

            try {
                // التقاط الصورة بدقة 2x
                const dataUrl = await htmlToImage.toPng(canvas, {
                    pixelRatio: 2,
                    cacheBust: true,
                    style: {
                        transform: 'scale(1)', // التصوير بالحجم الأصلي دوماً
                    }
                });

                // محاولة التحميل التلقائي
                const link = document.createElement('a');
                link.download = `DarkFM_${Date.now()}.png`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // إظهار المعاينة للحفظ اليدوي (أكثر ضماناً للجوال)
                resultPreview.src = dataUrl;
                resultPreview.style.display = 'block';
                saveInstructions.classList.remove('hidden');
                
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            } catch (err) {
                console.error('Error:', err);
                alert('فشل الحفظ التلقائي. حاول مرة أخرى أو استخدم لقطة شاشة.');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    توليد وحفظ الصورة
                `;
                updateScale();
            }
        };
    </script>
</body>
</html>
