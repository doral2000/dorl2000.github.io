<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة دارك FM - صانع الأخبار العاجلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #canvas-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* التصميم الأساسي */
        #news-canvas {
            width: 400px;
            height: 500px;
            position: relative;
            overflow: hidden;
            background: #1e293b; /* لون أساسي لضمان الظهور في حال فشل التدرج */
            background-image: linear-gradient(135deg, #334155, #0f172a);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform-origin: top center;
            border-radius: 4px;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            z-index: 1;
        }

        .urgent-badge {
            background-color: #e11d48;
            color: white;
            padding: 8px 24px;
            font-weight: 900;
            font-size: 1.25rem;
            display: inline-block;
            position: relative;
            z-index: 10;
            border-radius: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        #bg-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .content-area {
            position: absolute;
            left: 25px;
            right: 25px;
            z-index: 5;
        }

        .content-image-mode {
            bottom: 40px;
            top: auto;
        }

        .content-text-mode {
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 25px;
            border-radius: 12px;
            border-right: 8px solid #e11d48;
        }

        #result-preview {
            display: none;
            max-width: 100%;
            margin-top: 25px;
            border: 4px solid #e11d48;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(225, 29, 72, 0.4);
        }

        .logo-area {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        
        <!-- معاينة التصميم -->
        <div id="canvas-wrapper" class="order-1">
            <div id="news-canvas">
                <img id="bg-preview" src="" style="display: none;">
                <div id="gradient-overlay" class="gradient-overlay" style="display: none;"></div>

                <div class="logo-area">
                    <div class="bg-black/90 px-4 py-2 rounded-lg border border-gray-700">
                        <div class="text-right">
                            <h1 class="text-xl font-black text-white leading-none">إذاعة دارك</h1>
                            <p class="text-[11px] text-red-500 font-black mt-1">94.3 FM</p>
                        </div>
                    </div>
                </div>

                <div id="content-container" class="content-area content-text-mode">
                    <div class="flex mb-4">
                        <div class="urgent-badge">خبر عاجل</div>
                    </div>
                    
                    <div id="display-title" class="text-red-500 font-black text-sm mb-2">الآن مباشرة</div>
                    
                    <div id="display-text" class="font-bold leading-tight text-white mb-6" style="font-size: 26px;">
                        اكتب تفاصيل الخبر هنا...
                    </div>
                    
                    <div class="flex justify-between items-center border-t border-red-600/30 pt-4">
                        <div class="h-1.5 w-14 bg-red-600 rounded-full"></div>
                        <div id="display-date" class="text-gray-300 text-xs font-bold"></div>
                    </div>
                </div>
            </div>
            
            <div id="save-instructions" class="hidden mt-6 bg-blue-900/40 p-4 rounded-xl border border-blue-500/50 text-center w-full">
                <p class="text-blue-300 font-black text-sm">جاهز للحفظ!</p>
                <p class="text-white text-xs mt-1">انقر مطولاً على الصورة أدناه ثم اختر "حفظ الصورة".</p>
            </div>
            
            <img id="result-preview" alt="اضغط مطولاً للحفظ">
        </div>

        <!-- أدوات التحكم -->
        <div class="bg-gray-900 p-6 rounded-3xl shadow-2xl space-y-6 order-2 border border-gray-800">
            <h2 class="text-2xl font-black text-red-600 border-b border-gray-800 pb-4">لوحة التحكم (كروم)</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2">خلفية الخبر</label>
                    <div class="flex gap-2">
                        <input type="file" id="image-input" accept="image/*" class="w-full text-xs text-gray-400 file:bg-gray-800 file:text-white file:border-0 file:py-2 file:px-4 file:rounded-full cursor-pointer">
                        <button id="clear-img" class="bg-red-900/30 text-red-500 px-4 rounded-full text-xs font-bold">حذف</button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2">النص الأساسي</label>
                    <textarea id="text-input" rows="3" class="w-full bg-black border border-gray-800 rounded-xl p-4 text-white font-bold focus:border-red-600 outline-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">العنوان</label>
                        <input type="text" id="title-input" value="الآن مباشرة" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-white font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">حجم النص</label>
                        <input type="range" id="font-size-slider" min="20" max="40" value="26" class="w-full accent-red-600 mt-3">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2">التاريخ</label>
                    <input type="text" id="date-input" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-white font-bold">
                </div>
            </div>

            <button id="download-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-5 rounded-2xl shadow-xl transition-transform active:scale-95 flex items-center justify-center gap-3">
                <span>توليد صورة الخبر</span>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('news-canvas');
        const textInput = document.getElementById('text-input');
        const titleInput = document.getElementById('title-input');
        const dateInput = document.getElementById('date-input');
        const imageInput = document.getElementById('image-input');
        const displayText = document.getElementById('display-text');
        const displayTitle = document.getElementById('display-title');
        const displayDate = document.getElementById('display-date');
        const bgPreview = document.getElementById('bg-preview');
        const gradientOverlay = document.getElementById('gradient-overlay');
        const contentContainer = document.getElementById('content-container');
        const downloadBtn = document.getElementById('download-btn');
        const resultPreview = document.getElementById('result-preview');
        const saveInstructions = document.getElementById('save-instructions');

        // ضبط التاريخ التلقائي
        const updateDate = () => {
            const d = new Date();
            const str = d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
            dateInput.value = str;
            displayDate.innerText = str;
        };
        updateDate();

        dateInput.oninput = (e) => displayDate.innerText = e.target.value;
        textInput.oninput = (e) => displayText.innerText = e.target.value || 'اكتب الخبر هنا...';
        titleInput.oninput = (e) => displayTitle.innerText = e.target.value;
        document.getElementById('font-size-slider').oninput = (e) => displayText.style.fontSize = e.target.value + 'px';

        // تغيير الحجم للجوال
        function rescale() {
            const wrapper = document.getElementById('canvas-wrapper');
            const scale = Math.min(wrapper.clientWidth / 400, 1);
            canvas.style.transform = `scale(${scale})`;
            if (resultPreview.style.display !== 'block') {
                wrapper.style.height = (500 * scale) + "px";
            } else {
                wrapper.style.height = "auto";
            }
        }
        window.onresize = rescale;
        rescale();

        // معالجة الصور
        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    bgPreview.src = ev.target.result;
                    bgPreview.style.display = 'block';
                    gradientOverlay.style.display = 'block';
                    contentContainer.classList.remove('content-text-mode');
                    contentContainer.classList.add('content-image-mode');
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('clear-img').onclick = () => {
            bgPreview.style.display = 'none';
            gradientOverlay.style.display = 'none';
            contentContainer.classList.add('content-text-mode');
            contentContainer.classList.remove('content-image-mode');
            imageInput.value = '';
        };

        // المحرك المحدث للحفظ
        downloadBtn.onclick = async () => {
            downloadBtn.disabled = true;
            downloadBtn.innerText = 'جاري المعالجة...';
            
            resultPreview.style.display = 'none';
            saveInstructions.classList.add('hidden');

            // انتظار تحميل الخطوط والعناصر
            await document.fonts.ready;
            await new Promise(r => setTimeout(r, 600));

            const options = {
                pixelRatio: 2,
                cacheBust: true,
                backgroundColor: '#0f172a', // لون خلفية احتياطي في حال النص فقط
                style: {
                    transform: 'scale(1)',
                    left: '0',
                    top: '0'
                }
            };

            try {
                // محاولة توليد PNG
                const dataUrl = await htmlToImage.toPng(canvas, options);
                
                // إظهار النتيجة للمستخدم (أكثر طريقة مضمونة في كروم للهاتف)
                resultPreview.src = dataUrl;
                resultPreview.style.display = 'block';
                saveInstructions.classList.remove('hidden');

                // محاولة تحميل تلقائي (قد تنجح في بعض نسخ كروم)
                const link = document.createElement('a');
                link.download = `DarkFM_News_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();

                // التمرير للنتيجة
                resultPreview.scrollIntoView({ behavior: 'smooth' });
                
            } catch (err) {
                console.error('Save error:', err);
                alert('فشل الحفظ التلقائي. يرجى تجربة التقاط سكرين شوت أو تحديث المتصفح.');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerText = 'توليد صورة الخبر';
                rescale();
            }
        };
    </script>
</body>
</html>
