<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إذاعة دارك FM - صانع الأخبار الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #e11d48;
            --theme-bg: rgba(225, 29, 72, 0.9);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #111827;
            color: white;
            padding-bottom: 50px;
        }

        /* حاوية المعاينة في الأعلى */
        .preview-header {
            width: 100%;
            background: #0f172a;
            padding: 20px 10px;
            border-bottom: 2px solid #1e293b;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        #news-canvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1f2937, #111827);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 8px;
        }

        #img-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }

        #bg-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center;
            transition: transform 0.1s ease-out, border 0.3s ease;
        }

        .img-with-border {
            border: 6px solid var(--theme-color) !important;
            border-radius: 4px;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            z-index: 1;
        }

        .urgent-tag {
            background: var(--theme-color);
            color: white;
            padding: 4px 16px;
            font-weight: 900;
            font-size: 14px;
            display: inline-block;
            clip-path: polygon(0 0, 90% 0, 100% 100%, 10% 100%);
            transition: background-color 0.3s ease;
        }

        .content-area {
            position: absolute;
            left: 15px;
            right: 15px;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .content-image-mode {
            bottom: 45px;
            top: auto;
            transform: none;
            background: transparent;
        }

        .content-text-mode {
            top: 50%;
            bottom: auto;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 12px;
            border-right: 5px solid var(--theme-color);
        }

        .logo-area {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 2;
        }

        .social-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-top: 2px solid var(--theme-color);
            padding: 5px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .social-icons svg {
            width: 12px;
            height: 12px;
            fill: white;
            margin-left: 6px;
        }

        .control-btn {
            transition: all 0.2s;
        }
        
        input[type=range] {
            accent-color: var(--theme-color);
        }
    </style>
</head>
<body>

    <!-- قسم المعاينة في الأعلى -->
    <div class="preview-header">
        <div id="news-canvas">
            <div id="img-container">
                <img id="bg-preview" src="" alt="" style="display: none;">
            </div>
            <div id="gradient-overlay" class="gradient-overlay" style="display: none;"></div>

            <div class="logo-area">
                <div class="bg-black/80 backdrop-blur-md px-3 py-1 rounded border border-gray-600">
                    <div class="flex flex-col text-right">
                        <h1 class="text-lg font-black text-white leading-tight">إذاعة دارك</h1>
                        <p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">94.3 FM</p>
                    </div>
                </div>
            </div>

            <div id="content-container" class="content-area content-text-mode">
                <div id="urgent-badge" class="urgent-tag mb-2">عاجل</div>
                <div id="display-text" class="font-bold leading-snug text-white mb-3" style="font-size: 22px;">
                    اكتب تفاصيل الخبر هنا ليظهر بشكل احترافي
                </div>
                <div id="theme-line" class="h-1 w-16 mb-2" style="background-color: var(--theme-color);"></div>
                <div id="display-date" class="text-gray-300 text-[10px] font-bold"></div>
            </div>

            <div class="social-footer">
                <span class="text-[9px] font-bold text-white">تابع إذاعة دارك</span>
                <div class="social-icons flex items-center">
                    <svg viewBox="0 0 320 512"><path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/></svg>
                    <svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
                    <svg viewBox="0 0 576 512"><path d="M549.655 124.083c-6.281-23.65-24.787-42.276-48.284-48.597C458.781 64 288 64 288 64S117.22 64 74.629 75.486c-23.497 6.322-42.003 24.947-48.284 48.597-11.412 42.867-11.412 132.305-11.412 132.305s0 89.438 11.412 132.305c6.281 23.65 24.787 41.5 48.284 47.821C117.22 448 288 448 288 448s170.78 0 213.371-11.486c23.497-6.321 42.003-24.171 48.284-47.821 11.412-42.867 11.412-132.305 11.412-132.305s0-89.438-11.412-132.305zm-317.51 213.508V175.185l142.739 81.205-142.739 81.201z"/></svg>
                    <svg viewBox="0 0 496 512"><path d="M248 8C111 8 0 119 0 256s111 248 248 248 248-111 248-248S385 8 248 8zm114.9 168.6c-4.2 24.5-22.9 122.9-32.5 170.2-4.1 20.4-11.6 27.2-18.8 27.9-15.5 1.4-27.2-10.2-42.1-20-23.5-15.3-36.8-24.7-59.5-39.7-26-17.1-9.2-26.6 5.8-42.1 3.9-4.1 72.1-66.2 73.4-71.8 1.5-6.7-1.1-9.4-4.5-9.4-4.1 0-25.5 14.1-72.1 45.6-68.3 46.1-98.3 58-132.9 57.1-23.4-.6-68.7-13.3-102.3-24.2-40.4-13.1-72.5-20.1-69.7-42.5 1.5-11.9 17.5-24.2 48-37.1 187.9-81.8 313.1-133.7 375.6-159.5 17.9-7.4 35.3-12.7 49-13.1 13.1-.4 27.9 3 36.3 11.4 6 6 8.3 14.1 9.4 22 1.2 10.1.7 21.8-.7 34.6z"/></svg>
                    <svg viewBox="0 0 448 512"><path d="M448 209.91a210.06 210.06 0 0 1-122.77-39.25V349.38A162.55 162.55 0 1 1 185 188.31v89.89a74.62 74.62 0 1 0 52.23 71.18V0l88 0a121.18 121.18 0 0 0 1.86 22.17h0A122.18 122.18 0 0 0 381 102.39a121.43 121.43 0 0 0 67 20.14Z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div class="max-w-4xl mx-auto px-4 pb-10">
        <div class="bg-gray-800 p-6 rounded-2xl shadow-xl space-y-6 border border-gray-700">
            
            <!-- القوالب -->
            <div class="space-y-3">
                <label class="block text-gray-400 text-xs font-bold uppercase tracking-wider">اختيار القالب</label>
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-2">
                    <button onclick="updateTheme('news')" class="control-btn bg-red-600 p-2 rounded text-xs font-bold border border-transparent hover:border-white">عاجل</button>
                    <button onclick="updateTheme('sports')" class="control-btn bg-green-600 p-2 rounded text-xs font-bold border border-transparent hover:border-white">رياضة</button>
                    <button onclick="updateTheme('appeals')" class="control-btn bg-orange-600 p-2 rounded text-xs font-bold border border-transparent hover:border-white">مناشدة</button>
                    <button onclick="updateTheme('entertainment')" class="control-btn bg-purple-600 p-2 rounded text-xs font-bold border border-transparent hover:border-white">ترفيه</button>
                    <button onclick="updateTheme('tech')" class="control-btn bg-cyan-600 p-2 rounded text-xs font-bold border border-transparent hover:border-white">تكنولوجيا</button>
                </div>
            </div>

            <!-- التحكم بالصورة -->
            <div class="bg-gray-900/50 p-4 rounded-xl space-y-4">
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="flex-1">
                        <label class="block text-gray-400 text-[10px] mb-1 font-bold">تحميل الصورة</label>
                        <input type="file" id="image-input" accept="image/*" class="w-full text-xs text-gray-400 file:bg-gray-700 file:text-white file:border-0 file:px-3 file:py-1 file:rounded file:cursor-pointer">
                    </div>
                    <div class="flex gap-2">
                        <button id="toggle-border-btn" class="bg-gray-700 px-3 py-1 rounded text-[10px] font-bold border border-gray-600">إضافة إطار</button>
                        <button id="remove-image-btn" class="bg-red-900/40 text-red-300 px-3 py-1 rounded text-[10px] font-bold border border-red-900/50">حذف</button>
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-[10px] text-gray-400">حجم الصورة</label>
                        <span id="scale-val" class="text-[10px]">100%</span>
                    </div>
                    <input type="range" id="img-scale-slider" min="50" max="150" value="100" class="w-full">
                </div>
            </div>

            <!-- التحكم بالنص -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <label class="block text-gray-400 text-xs font-bold uppercase tracking-wider">نص الخبر</label>
                    <button id="toggle-urgent-btn" class="text-[10px] bg-gray-700 px-2 py-1 rounded border border-gray-600">إخفاء "عاجل"</button>
                </div>
                <textarea id="text-input" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-red-500 outline-none" placeholder="اكتب الخبر هنا..."></textarea>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-[10px] text-gray-400">حجم الخط</label>
                            <span id="font-val" class="text-[10px]">22px</span>
                        </div>
                        <input type="range" id="font-size-slider" min="14" max="40" value="22" class="w-full">
                    </div>
                </div>
            </div>

            <!-- زر الحفظ -->
            <button id="download-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl shadow-lg border-b-4 border-green-800 transition-all active:border-0 active:translate-y-1">
                حفظ في الاستوديو
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('news-canvas');
        const textInput = document.getElementById('text-input');
        const displayText = document.getElementById('display-text');
        const urgentBadge = document.getElementById('urgent-badge');
        const bgPreview = document.getElementById('bg-preview');
        const imageInput = document.getElementById('image-input');
        const container = document.getElementById('content-container');
        const gradient = document.getElementById('gradient-overlay');
        const themeLine = document.getElementById('theme-line');
        const socialFooter = document.querySelector('.social-footer');

        const themes = {
            news: { color: '#e11d48', label: 'عاجل' },
            sports: { color: '#16a34a', label: 'رياضة' },
            appeals: { color: '#ea580c', label: 'مناشدة' },
            entertainment: { color: '#9333ea', label: 'ترفيه' },
            tech: { color: '#06b6d4', label: 'تكنولوجيا' }
        };

        // دالة تحديث القالب
        window.updateTheme = function(t) {
            const data = themes[t];
            document.documentElement.style.setProperty('--theme-color', data.color);
            urgentBadge.innerText = data.label;
            urgentBadge.style.backgroundColor = data.color;
            themeLine.style.backgroundColor = data.color;
            socialFooter.style.borderColor = data.color;
        };

        // تحديث النص
        textInput.addEventListener('input', (e) => {
            displayText.innerText = e.target.value || 'اكتب تفاصيل الخبر هنا ليظهر بشكل احترافي';
        });

        // حجم الخط
        document.getElementById('font-size-slider').addEventListener('input', (e) => {
            displayText.style.fontSize = e.target.value + 'px';
            document.getElementById('font-val').innerText = e.target.value + 'px';
        });

        // إظهار/إخفاء عاجل
        let badgeVisible = true;
        document.getElementById('toggle-urgent-btn').addEventListener('click', (e) => {
            badgeVisible = !badgeVisible;
            urgentBadge.style.display = badgeVisible ? 'inline-block' : 'none';
            e.target.innerText = badgeVisible ? 'إخفاء "عاجل"' : 'إظهار "عاجل"';
        });

        // معالجة الصور
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    bgPreview.src = event.target.result;
                    bgPreview.style.display = 'block';
                    gradient.style.display = 'block';
                    container.className = 'content-area content-image-mode';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('remove-image-btn').addEventListener('click', () => {
            bgPreview.style.display = 'none';
            gradient.style.display = 'none';
            container.className = 'content-area content-text-mode';
            imageInput.value = '';
        });

        document.getElementById('img-scale-slider').addEventListener('input', (e) => {
            const s = e.target.value / 100;
            bgPreview.style.transform = `scale(${s})`;
            document.getElementById('scale-val').innerText = e.target.value + '%';
        });

        let borderActive = false;
        document.getElementById('toggle-border-btn').addEventListener('click', (e) => {
            borderActive = !borderActive;
            if (borderActive) {
                bgPreview.classList.add('img-with-border');
                e.target.innerText = 'إزالة الإطار';
                e.target.classList.add('bg-blue-600');
            } else {
                bgPreview.classList.remove('img-with-border');
                e.target.innerText = 'إضافة إطار';
                e.target.classList.remove('bg-blue-600');
            }
        });

        // التاريخ
        const d = new Date();
        document.getElementById('display-date').innerText = d.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});

        // الحفظ
        document.getElementById('download-btn').addEventListener('click', async () => {
            const btn = document.getElementById('download-btn');
            btn.innerText = 'جاري التحضير...';
            try {
                await document.fonts.ready;
                const canvasOut = await html2canvas(canvas, { scale: 3, useCORS: true });
                const imgData = canvasOut.toDataURL('image/png');
                
                if (window.Android && window.Android.saveImage) {
                    window.Android.saveImage(imgData.split(',')[1]);
                } else {
                    const link = document.createElement('a');
                    link.download = 'DarkFM_News.png';
                    link.href = imgData;
                    link.click();
                }
            } catch (err) {
                alert('خطأ في الحفظ');
            }
            btn.innerText = 'حفظ في الاستوديو';
        });
    </script>
</body>
</html>
